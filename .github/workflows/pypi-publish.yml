name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write # Needed to update the version in the repo if desired
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set Version from Tag
        run: |
          # Grabs the tag name (v0.1.1) and strips the 'v' (0.1.1)
          CLEAN_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          sed -i "s/^version = \".*\"/version = \"$CLEAN_VERSION\"/" pyproject.toml
          echo "Building version: $CLEAN_VERSION"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish